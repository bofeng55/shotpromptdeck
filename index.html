<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频工作台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=20260412c">
</head>
<body>
  <div class="shell">
    <div class="app-header">
      <nav class="view-switcher" aria-label="页面切换">
        <button id="workspaceTab" class="view-tab is-active" type="button">工作台</button>
        <button id="subjectsTab" class="view-tab" type="button">主体库</button>
        <button id="favoritesTab" class="view-tab" type="button">收藏夹</button>
      </nav>
      <button id="settingsButton" class="ghost-button settings-trigger" type="button">模型与 API 设置</button>
    </div>

    <header class="hero">
      <div>
        <p class="eyebrow">AI Video Workspace</p>
        <h1 class="hero-title">
          <span id="heroTitleLine1">视频</span>
          <span id="heroTitleLine2">工作台</span>
        </h1>
        <p class="subtitle">
          <span id="heroSubtitleLine1">上传参考素材，生成或手写 Prompt，</span>
          <span id="heroSubtitleLine2">一键提交视频生成，迭代归档。</span>
        </p>
      </div>
      <div id="workspaceControls" class="hero-panel">
        <div class="hero-settings-grid">
          <label class="field hero-field-wide">
            <span>全局提示词风格备注</span>
            <textarea id="globalDirection" rows="3" placeholder="例如：偏电影感，镜头运动克制，强调自然光、颗粒、真实皮肤质感"></textarea>
          </label>
        </div>
        <div class="hero-actions">
          <section class="hero-actions-group">
            <p class="hero-actions-label">创建与生成</p>
            <div class="hero-actions-row hero-actions-primary">
              <label id="imageUploadTrigger" class="upload-button">
                <input id="imageUpload" type="file" accept="image/*,.heic,.heif,.jpg,.jpeg,.png,.webp" multiple>
                批量上传镜头图
              </label>
              <div class="hero-generate-panel">
                <p class="hero-inline-label">批量生成模式</p>
                <select id="batchMode">
                  <option value="empty">只生成空 Prompt 镜头</option>
                  <option value="all">重写全部有图镜头</option>
                </select>
                <button id="batchGenerateButton" class="secondary-button" type="button">批量生成 Prompt</button>
              </div>
            </div>
          </section>
          <section class="hero-actions-group">
            <p class="hero-actions-label">导出与整理</p>
            <div class="hero-actions-row hero-actions-secondary">
              <button id="exportPromptsButton" class="ghost-button" type="button">导出全部 Prompt</button>
              <button id="exportButton" class="ghost-button" type="button">导出工作区</button>
              <label class="ghost-button import-button">
                <input id="importInput" type="file" accept="application/json">
                导入工作区
              </label>
              <button id="clearButton" class="ghost-button danger-soft" type="button">清空工作台记录</button>
            </div>
          </section>
        </div>
      </div>
    </header>

    <main>
      <section id="workspaceView">
        <section id="workspaceSummary" class="summary-bar">
          <div>
            <strong id="shotCount">0</strong>
            <span>个镜头</span>
          </div>
          <div>
            <strong id="historyCount">0</strong>
            <span>条 Prompt归档</span>
          </div>
          <div>
            <strong id="chatCount">0</strong>
            <span>条修改对话</span>
          </div>
          <p id="statusText" class="status-text">本地自动存档已开启。</p>
        </section>
        <section id="shotsContainer" class="shots-container"></section>
      </section>

      <section id="subjectsView" hidden>
        <section class="summary-bar">
          <div>
            <strong id="subjectCount">0</strong>
            <span>个主体</span>
          </div>
          <p class="status-text">存放角色、场景、道具的设定图，在 Prompt 中用 @ 调用。</p>
        </section>
        <section class="subjects-grid">
          <div class="subjects-upload-zone">
            <input id="subjectsUploadInput" type="file" accept="image/*" multiple class="hidden-file-input">
            <span class="drag-tip">拖拽或点击上传主体设定图</span>
          </div>
          <div id="subjectsContainer" class="subjects-list"></div>
        </section>
      </section>

      <section id="favoritesView" hidden>
        <section class="summary-bar">
          <div>
            <strong id="favoriteCount">0</strong>
            <span>个镜头</span>
          </div>
          <div>
            <strong id="favoriteHistoryCount">0</strong>
            <span>条 Prompt归档</span>
          </div>
          <label class="field compact favorites-search-field">
            <span>检索收藏</span>
            <input id="favoritesSearch" type="text" placeholder="搜索标题、导演讲戏、提示词">
          </label>
          <label class="field compact favorites-filter-field">
            <span>标签筛选</span>
            <select id="favoritesTagFilter">
              <option value="">全部标签</option>
            </select>
          </label>
          <label class="field compact favorites-batch-field">
            <span>批量处理</span>
            <button id="favoritesBatchToggleButton" class="ghost-button" type="button">批量处理</button>
          </label>
          <p class="status-text">收藏夹一共有以上内容，保存在当前浏览器本地。</p>
        </section>
        <section id="favoritesBulkBar" class="favorites-bulk-bar" hidden>
          <div class="favorites-bulk-main">
            <div class="favorites-bulk-meta">
              <strong id="favoritesSelectedCount">0</strong>
              <span>已选收藏</span>
            </div>
            <p class="favorites-bulk-hint">批量处理模式下，点击收藏卡片即可选中或取消。</p>
          </div>
          <div class="favorites-bulk-actions">
            <div class="favorites-bulk-row favorites-bulk-row-tags">
              <button id="favoritesSelectAllButton" class="ghost-button" type="button">全选</button>
              <input id="favoritesBulkTagsInput" class="favorites-bulk-tags-input" type="text" placeholder="输入标签后批量添加，例如：第一场，s01，角色名，奇幻">
              <button id="favoritesBulkTagButton" class="ghost-button favorite-accent-button" type="button">添加标签</button>
            </div>
            <div class="favorites-bulk-row favorites-bulk-row-actions">
              <button id="favoritesBulkExportButton" class="ghost-button" type="button">导出选中</button>
              <label class="ghost-button import-button favorites-import-button">
                <input id="favoritesImportInput" type="file" accept="application/json">
                导入收藏
              </label>
              <button id="favoritesBulkMoveButton" class="ghost-button" type="button">移入工作台</button>
              <button id="favoritesBulkDeleteButton" class="ghost-button danger" type="button">删除</button>
            </div>
          </div>
        </section>
        <section id="favoritesContainer" class="favorites-grid"></section>
      </section>

      <template id="shotTemplate">
        <article class="shot-card">
          <div class="shot-order"></div>
          <div class="shot-main">
            <section class="image-panel">
              <div class="references-editor">
                <div class="references-header">
                  <h3>全能参考&nbsp;/&nbsp;图生视频</h3>
                  <span class="meta references-capacity"></span>
                </div>
                <div class="references-list"></div>
                <div class="references-upload-zone">
                  <input class="references-upload-input hidden-file-input" type="file" accept="image/*,video/*,audio/*" multiple>
                  <span class="drag-tip">拖拽或点击上传素材（图片可设为首帧/尾帧，也支持视频/音频）</span>
                </div>
              </div>
              <label class="field compact">
                <span>镜头标题</span>
                <input class="shot-title" type="text" placeholder="例如：s01c001">
              </label>
              <label class="field compact">
                <span>导演讲戏 / 镜头描述</span>
                <textarea class="director-notes" rows="5" placeholder="例如：女孩推开咖啡馆的门，逆光走进来，背后街道人来人往"></textarea>
              </label>
              <div class="card-actions stack">
                <button class="secondary-button generate-button" type="button">AI 生成 Prompt</button>
              </div>
            </section>

            <section class="prompt-panel">
              <div class="panel-header">
                <h2>视频 Prompt</h2>
                <span class="meta current-version-label"></span>
              </div>
              <label class="field">
                <span>当前 Prompt</span>
                <textarea class="shot-prompt" rows="12" placeholder="可先手写，也可直接让 AI 基于图片生成"></textarea>
              </label>
              <div class="card-actions">
                <button class="secondary-button save-button" type="button">保存当前版本</button>
                <button class="ghost-button copy-button" type="button">复制 Prompt</button>
              </div>
              <div class="history-panel">
                <div class="panel-header">
                  <h3>Prompt归档</h3>
                  <span class="meta history-count"></span>
                </div>
                <div class="history-list"></div>
              </div>
              <div class="chat-section">
                <label class="field">
                  <span>AI 修改要求</span>
                  <textarea class="feedback-input" rows="3" placeholder="例如：改为手持运镜；镜头更有冲击力；角色表演更克制；补充运镜、光线、动作"></textarea>
                </label>
                <div class="card-actions">
                  <button class="secondary-button revise-button" type="button">让 AI 修改 Prompt</button>
                </div>
              </div>
            </section>

            <section class="video-panel">
              <div class="panel-header">
                <h2>视频生成</h2>
                <span class="meta video-task-label">尚未提交任务</span>
              </div>
              <p class="video-panel-hint">默认使用当前 Prompt，设为"首帧"或"尾帧"的图片用于图生视频，其余素材作为参考一起提交。</p>
              <div class="video-settings-grid">
                <label class="field compact">
                  <span>比例</span>
                  <select class="video-ratio">
                    <option value="16:9">16:9</option>
                    <option value="9:16">9:16</option>
                    <option value="1:1">1:1</option>
                    <option value="4:3">4:3</option>
                    <option value="3:4">3:4</option>
                    <option value="21:9">21:9</option>
                    <option value="adaptive">adaptive</option>
                  </select>
                </label>
                <label class="field compact">
                  <span>时长</span>
                  <select class="video-duration">
                    <option value="4">4 秒</option>
                    <option value="5" selected>5 秒</option>
                    <option value="6">6 秒</option>
                    <option value="7">7 秒</option>
                    <option value="8">8 秒</option>
                    <option value="9">9 秒</option>
                    <option value="10">10 秒</option>
                    <option value="11">11 秒</option>
                    <option value="12">12 秒</option>
                    <option value="13">13 秒</option>
                    <option value="14">14 秒</option>
                    <option value="15">15 秒</option>
                  </select>
                </label>
                <label class="field compact">
                  <span>分辨率</span>
                  <select class="video-resolution">
                    <option value="">模型默认</option>
                    <option value="480p">480p</option>
                    <option value="720p">720p</option>
                  </select>
                </label>
                <label class="field compact">
                  <span>随机种子</span>
                  <input class="video-seed" type="number" min="0" max="2147483647" step="1" placeholder="留空为随机">
                </label>
              </div>
              <div class="video-checks">
                <label class="checkbox-field">
                  <input class="video-generate-audio" type="checkbox" checked>
                  <span>生成有声视频</span>
                </label>
                <label class="checkbox-field">
                  <input class="video-camera-fixed" type="checkbox">
                  <span>固定镜头</span>
                </label>
                <label class="checkbox-field">
                  <input class="video-watermark" type="checkbox">
                  <span>添加水印</span>
                </label>
                <label class="checkbox-field">
                  <input class="video-return-last-frame" type="checkbox">
                  <span>返回尾帧图</span>
                </label>
              </div>
              <div class="card-actions">
                <button class="secondary-button generate-video-button" type="button">生成视频</button>
                <button class="ghost-button refresh-video-button" type="button">刷新任务状态</button>
                <button class="ghost-button clear-video-button" type="button">清空结果</button>
              </div>
              <div class="video-result-panel">
                <div class="video-result-empty">视频结果会显示在这里。</div>
                <video class="generated-video" controls playsinline hidden></video>
                <img class="video-last-frame" alt="生成视频尾帧预览" hidden>
                <div class="video-result-meta"></div>
              </div>
              <div class="video-history-panel">
                <div class="panel-header">
                  <h3>视频归档</h3>
                  <span class="meta video-history-count"></span>
                </div>
                <div class="video-history-list"></div>
              </div>
            </section>
          </div>

          <footer class="shot-footer">
            <div class="shot-footer-group shot-footer-side shot-footer-favorite">
              <button class="ghost-button favorite-button favorite-accent-button" type="button">收藏此镜头</button>
              <button class="ghost-button duplicate-favorite-button favorite-accent-button" type="button" hidden>新建收藏</button>
            </div>
            <div class="shot-footer-group insert-actions-grid">
              <button class="ghost-button insert-above-button" type="button">上插镜头</button>
              <button class="ghost-button insert-below-button" type="button">下插镜头</button>
            </div>
            <div class="shot-footer-group shot-footer-side shot-footer-danger">
              <button class="ghost-button delete-button danger" type="button">删除此镜头</button>
            </div>
          </footer>
        </article>
      </template>

      <template id="favoriteTemplate">
        <article class="favorite-tile">
          <button class="favorite-open-button" type="button">
            <div class="image-frame favorite-image-frame">
              <img class="shot-image favorite-image" alt="收藏镜头图预览">
              <div class="image-empty">未上传镜头图</div>
            </div>
            <div class="favorite-meta-list">
              <p class="favorite-title"></p>
            </div>
          </button>
          <div class="favorite-tile-actions">
            <button class="ghost-button move-to-workspace-button" type="button">移入工作台</button>
            <button class="ghost-button unfavorite-button danger" type="button">删除</button>
          </div>
        </article>
      </template>
    </main>
  </div>

  <div id="favoriteModal" class="detail-modal" hidden>
    <div class="detail-modal-backdrop"></div>
    <div class="detail-modal-dialog" role="dialog" aria-modal="true" aria-label="收藏详情">
      <div id="favoriteModalContent"></div>
    </div>
  </div>

  <div id="settingsModal" class="detail-modal" hidden>
    <div class="detail-modal-backdrop"></div>
    <div class="detail-modal-dialog settings-modal-dialog" role="dialog" aria-modal="true" aria-label="模型与 API 设置">
      <div id="settingsModalContent"></div>
    </div>
  </div>

  <div id="lightbox" class="lightbox" hidden>
    <div class="lightbox-backdrop"></div>
    <div class="lightbox-dialog" role="dialog" aria-modal="true" aria-label="媒体预览">
      <button id="lightboxClose" class="lightbox-close" type="button" aria-label="关闭预览">关闭</button>
      <img id="lightboxImage" class="lightbox-image" alt="放大预览">
      <video id="lightboxVideo" class="lightbox-video" controls playsinline hidden></video>
      <audio id="lightboxAudio" class="lightbox-audio" controls hidden></audio>
    </div>
  </div>

  <script src="./app.js?v=20260412c"></script>
</body>
</html>
